<script>
// Fade-in observer
const faders = document.querySelectorAll('.fade-in');

const appearOptions = { threshold: 0.1 };

const appearOnScroll = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
        }
    });
}, appearOptions);

faders.forEach(fader => appearOnScroll.observe(fader));
</script>

<script>
// Navbar dropdowns and hover setup
const navbar = document.getElementById('navbar');
const openItems = new Set();

function refreshNavbarState() {
    if (openItems.size > 0) {
        navbar.classList.add('dropdown-open');
    } else {
        navbar.classList.remove('dropdown-open');
    }
}

function closeAllDropdowns() {
    document.querySelectorAll('.nav-item.dropdown').forEach(otherItem => {
        otherItem.classList.remove('open');
    });
    openItems.clear();
    refreshNavbarState();
}

function setupHoverDropdowns() {
    if (window.matchMedia('(min-width: 769px)').matches) {
        document.querySelectorAll('.nav-item.dropdown').forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.classList.add('open');
                openItems.add(item);
                refreshNavbarState();
            });
            item.addEventListener('mouseleave', () => {
                item.classList.remove('open');
                openItems.delete(item);
                refreshNavbarState();
            });
        });
    }
}

setupHoverDropdowns();

window.addEventListener('resize', () => {
    closeAllDropdowns();
});
</script>

<script>
// Hamburger toggle (also toggle body class to prevent background scroll)
const hamburger = document.getElementById('hamburger');
hamburger.addEventListener('click', () => {
    const isOpen = navbar.classList.toggle('open');
    document.body.classList.toggle('nav-open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

// Dropdown toggles
document.querySelectorAll('.dropdown-toggle').forEach(button => {
    button.addEventListener('click', (e) => {
        e.preventDefault();
        const item = button.parentElement;

        const isOpen = item.classList.contains('open');

        // Close all dropdowns first
        document.querySelectorAll('.nav-item.dropdown').forEach(otherItem => {
            otherItem.classList.remove('open');
        });

        // If it was previously closed, open it; otherwise keep closed
        if (!isOpen) {
            item.classList.add('open');
        }
    });
});
</script>

<script>
// Fixed-header fallback: make header fixed and insert a placeholder
(function(){
    function enableFixedHeader(){
        const includeHolder = document.getElementById('include-header');
        const header = includeHolder ? includeHolder.querySelector('header.site-header') : document.querySelector('header.site-header');
        if (!header) return;

        // Add class that forces fixed positioning
        header.classList.add('is-fixed');

        // Create or update placeholder right after the header to avoid content jump
        function updatePlaceholder(){
            let ph = document.getElementById('header-placeholder');
            if (!ph){
                ph = document.createElement('div');
                ph.id = 'header-placeholder';
                header.parentNode.insertBefore(ph, header.nextSibling);
            }
            // Use getBoundingClientRect to include padding/visual height
            const h = header.getBoundingClientRect().height;
            ph.style.height = h + 'px';
        }

        // Update on load, resize and when header's size changes
        updatePlaceholder();
        window.addEventListener('resize', updatePlaceholder, {passive:true});
        if (window.ResizeObserver) {
            const ro = new ResizeObserver(updatePlaceholder);
            ro.observe(header);
        }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', enableFixedHeader); else enableFixedHeader();
})();
</script>
