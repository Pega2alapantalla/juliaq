<script>
// Fade-in observer
const faders = document.querySelectorAll('.fade-in');

const appearOptions = { threshold: 0.1 };

const appearOnScroll = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
        }
    });
}, appearOptions);

faders.forEach(fader => appearOnScroll.observe(fader));
</script>

<script>
// Header shrink on scroll — robust: ensure header exists, set sticky, use rAF
(function(){
    function initHeaderShrink(){
        const header = document.querySelector('header');
        const headerLogo = document.querySelector('.header-logo');
        if (!header) return;

        // Ensure sticky positioning in case CSS was overridden
        try{
            header.style.position = header.style.position || 'sticky';
            header.style.top = header.style.top || '0';
            header.style.zIndex = header.style.zIndex || '1000';
        }catch(e){}

        let ticking = false;
        function update(){
            const sc = window.scrollY || window.pageYOffset;
            const wasFixed = header.classList.contains('fixed');
            if (sc > 5){
                header.classList.add('shrink');
                if (headerLogo) headerLogo.classList.add('shrink');
                if (!wasFixed){
                    header.classList.add('fixed');
                    // reserve space so content doesn't jump
                    try{ document.body.style.paddingTop = header.offsetHeight + 'px'; }catch(e){}
                }
            } else {
                header.classList.remove('shrink');
                if (headerLogo) headerLogo.classList.remove('shrink');
                if (wasFixed){
                    header.classList.remove('fixed');
                    try{ document.body.style.paddingTop = ''; }catch(e){}
                }
            }
            ticking = false;
        }

        function onScroll(){
            if (!ticking){
                ticking = true;
                window.requestAnimationFrame(update);
            }
        }

        window.addEventListener('scroll', onScroll, {passive: true});
        // run once to set initial state
        update();
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initHeaderShrink); else initHeaderShrink();
})();
</script>

<script>
// Navbar dropdowns and hover setup
const navbar = document.getElementById('navbar');
const openItems = new Set();

function refreshNavbarState() {
    if (openItems.size > 0) {
        navbar.classList.add('dropdown-open');
    } else {
        navbar.classList.remove('dropdown-open');
    }
}

function closeAllDropdowns() {
    document.querySelectorAll('.nav-item.dropdown').forEach(otherItem => {
        otherItem.classList.remove('open');
    });
    openItems.clear();
    refreshNavbarState();
}

function setupHoverDropdowns() {
    if (window.matchMedia('(min-width: 769px)').matches) {
        document.querySelectorAll('.nav-item.dropdown').forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.classList.add('open');
                openItems.add(item);
                refreshNavbarState();
            });
            item.addEventListener('mouseleave', () => {
                item.classList.remove('open');
                openItems.delete(item);
                refreshNavbarState();
            });
        });
    }
}

setupHoverDropdowns();

window.addEventListener('resize', () => {
    closeAllDropdowns();
});
</script>

<script>
// Hamburger toggle (also toggle body class to prevent background scroll)
const hamburger = document.getElementById('hamburger');
hamburger.addEventListener('click', () => {
    const isOpen = navbar.classList.toggle('open');
    document.body.classList.toggle('nav-open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
});

// Dropdown toggles
document.querySelectorAll('.dropdown-toggle').forEach(button => {
    button.addEventListener('click', (e) => {
        e.preventDefault();
        const item = button.parentElement;

        const isOpen = item.classList.contains('open');

        // Close all dropdowns first
        document.querySelectorAll('.nav-item.dropdown').forEach(otherItem => {
            otherItem.classList.remove('open');
        });

        // If it was previously closed, open it; otherwise keep closed
        if (!isOpen) {
            item.classList.add('open');
        }
    });
});
</script>
