    <!-- footer moved to includes/footer.html -->
    <div id="include-footer"></div>

    <!-- Loader: fetch includes/header.html, includes/footer.html and includes/scripts.html sequentially -->
    <script>
    (function(){
      async function loadHtml(url){
        const res = await fetch(url, {cache: 'no-store'});
        if (!res.ok) throw new Error('Failed to load ' + url + ' (' + res.status + ')');
        return await res.text();
      }

      async function insertIncludes(){
        // header
        const headerHolder = document.getElementById('include-header');
        if (headerHolder && headerHolder.innerHTML.trim() === ''){
          try{ headerHolder.innerHTML = await loadHtml('includes/header.html'); }catch(e){console.error(e)}
        }

        // footer
        const footerHolder = document.getElementById('include-footer');
        if (footerHolder && footerHolder.innerHTML.trim() === ''){
          try{ footerHolder.innerHTML = await loadHtml('includes/footer.html'); }catch(e){console.error(e)}
        }

        // scripts: fetch, parse and append sequentially to preserve order
        try{
          const scriptsText = await loadHtml('includes/scripts.html');
          const doc = new DOMParser().parseFromString(scriptsText, 'text/html');
          const scripts = Array.from(doc.querySelectorAll('script'));
          for (const s of scripts){
            if (s.src){
              await new Promise((res, rej) => {
                const sc = document.createElement('script');
                sc.src = s.src;
                sc.async = false;
                sc.onload = res; sc.onerror = rej;
                document.body.appendChild(sc);
              });
            } else {
              const sc = document.createElement('script');
              sc.textContent = s.textContent;
              document.body.appendChild(sc);
            }
          }
        } catch(e){ console.error('Error loading scripts include', e) }
      }

      // Run after DOM ready
      if (document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', insertIncludes);
      } else {
        insertIncludes();
      }
    })();
    </script>

</body>
