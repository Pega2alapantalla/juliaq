<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/juliaq/">  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Quintana</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="includes/lightbox2-2.12.0/dist/css/lightbox.css">
  <link href="https://db.onlinewebfonts.com/c/ed1df0d539f369028a8437b87f74b004?family=Ranade+Light" rel="stylesheet"> 
  <link href="https://db.onlinewebfonts.com/c/76934e6001ec75dd937de0a2b37c3f8b?family=Ranade+Medium" rel="stylesheet" type="text/css"/>
  
</head>
<body>
    <!-- header moved to includes/header.html (original header commented out) -->
    <!--
    <div class="header-rrsslogos"> ... original header commented for include ... </div>
    <header> ... </header>
    -->
    <div id="include-header"></div>

    <main>

      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="img/img1.png" alt="Descripción de la obra">
          </div>
          <div class="swiper-slide">
            <img src="img/img2.png" alt="Descripción de la obra">
          </div>
          <div class="swiper-slide">
            <img src="img/img3.png" alt="Descripción de la obra">
          </div>
        </div>
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>

      <div class="swiper-pagination"></div>



    </main>

    <!-- footer moved to includes/footer.html -->
    <div id="include-footer"></div>
<script type="module">
      import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'
      async function loadHtml(url){
        try {
          const res = await fetch(url, {cache: 'no-store'});
          if (!res.ok) return '';
          return await res.text();
        } catch(e) { return ''; }
      }

      async function insertIncludes(){
        // 1. Inyectar Header
        const headerHolder = document.getElementById('include-header');
        if (headerHolder) headerHolder.innerHTML = await loadHtml('includes/header.html');

        // 2. Inyectar Footer
        const footerHolder = document.getElementById('include-footer');
        if (footerHolder) footerHolder.innerHTML = await loadHtml('includes/footer.html');

        // 3. Inyectar Scripts externos (Lightbox, JQuery, etc)
        try {
          const scriptsText = await loadHtml('includes/scripts.html');
          const doc = new DOMParser().parseFromString(scriptsText, 'text/html');
          const scripts = Array.from(doc.querySelectorAll('script'));
          for (const s of scripts){
            await new Promise((resolve) => {
              const sc = document.createElement('script');
              if (s.src) {
                const srcAttr = s.getAttribute ? s.getAttribute('src') : s.src;
                let resolvedSrc = srcAttr;
                try { resolvedSrc = new URL(srcAttr, document.baseURI).href; } catch(e) { /* leave as-is */ }
                sc.src = resolvedSrc;
                sc.async = false;
                sc.onload = resolve;
                document.body.appendChild(sc);
              } else {
                sc.textContent = s.textContent;
                document.body.appendChild(sc);
                resolve();
              }
            });
          }
        } catch(e){ console.error('Error loading scripts', e) }

        // 4. Inicializar Swiper después de insertar scripts y cargar imágenes
        try {
          const imgs = Array.from(document.querySelectorAll('.mySwiper img'));
          await Promise.all(imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => { img.addEventListener('load', res); img.addEventListener('error', res); })));
        } catch(e) { /* ignore image load errors */ }
        initSwiper();
      }

      function initSwiper() {
        if (document.querySelector('.mySwiper')) {
          console.log('initSwiper: checking Swiper availability', typeof Swiper, document.querySelectorAll('.swiper-slide').length);
          if (typeof Swiper === 'undefined') {
            console.error('Swiper is not available on window; slider will not initialize');
            return;
          }
          new Swiper('.mySwiper', {
                loop: true,
                autoplay: { delay: 5000 },
                pagination: { el: '.swiper-pagination', clickable: true },
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                effect: 'fade',
                fadeEffect: { crossFade: true },
            });
        }
      }

      // Ejecución
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', insertIncludes);
      } else {
        insertIncludes();
      }
       </script>


</body>
</html>
