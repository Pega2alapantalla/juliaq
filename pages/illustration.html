<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="/juliaq/">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Illustration — Julia Quintana</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lightbox CSS removed (Fancybox used) -->
    
</head>
  <body>
    <div id="include-header"></div>

    <nav class="nav-illustration" aria-label="Illustration categories">
      <ul class="nav-menu illustration-categories">
        <li class="nav-item active" data-filter="all">All</li>
        <li class="nav-item" data-filter="printmaking">Printmaking</li>
        <li class="nav-item" data-filter="painting">Painting</li>
        <li class="nav-item" data-filter="lithography">Lithography</li>
        <li class="nav-item" data-filter="screen-painting">Screen painting</li>
        <li class="nav-item" data-filter="digital-art">Digital art</li>
      </ul>
    </nav>

    <main>
      <section id="gallery" class="gallery fade-in">
        <div class="gallery-item" data-category="painting">
          <img src="img/img1.png" alt="Painting 1">
        </div>
        <div class="gallery-item" data-category="digital-art">
          <img src="img/Freddie Mercury/1.png" alt="Freddie Mercury (2025)">
        </div>
      </section>
    </main>

    <!-- footer moved to includes/footer.html -->
    <div id="include-footer"></div>
<script type="module">
      import Swiper from 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.mjs'
      async function loadHtml(url){
        try {
          const res = await fetch(url, {cache: 'no-store'});
          if (!res.ok) return '';
          return await res.text();
        } catch(e) { return ''; }
      }

      async function insertIncludes(){
        // 1. Inyectar Header
        const headerHolder = document.getElementById('include-header');
        if (headerHolder) headerHolder.innerHTML = await loadHtml('includes/header.html');

        // 2. Inyectar Footer
        const footerHolder = document.getElementById('include-footer');
        if (footerHolder) footerHolder.innerHTML = await loadHtml('includes/footer.html');

        // 3. Inyectar Scripts externos (Lightbox, JQuery, etc)
        try {
          const scriptsText = await loadHtml('includes/scripts.html');
          const doc = new DOMParser().parseFromString(scriptsText, 'text/html');
          const scripts = Array.from(doc.querySelectorAll('script'));
          for (const s of scripts){
            await new Promise((resolve) => {
              const sc = document.createElement('script');
              if (s.src) {
                const srcAttr = s.getAttribute ? s.getAttribute('src') : s.src;
                let resolvedSrc = srcAttr;
                try { resolvedSrc = new URL(srcAttr, document.baseURI).href; } catch(e) { /* leave as-is */ }
                sc.src = resolvedSrc;
                sc.async = false;
                sc.onload = resolve;
                document.body.appendChild(sc);
              } else {
                sc.textContent = s.textContent;
                document.body.appendChild(sc);
                resolve();
              }
            });
          }
        } catch(e){ console.error('Error loading scripts', e) }

        // Initialize Fancybox (if available)
        try {
          if (window.Fancybox) {
            Fancybox.bind('[data-fancybox]', {
              Carousel: {
                Thumbs: false,
                Toolbar: {
                  display: {
                    left: [],
                    middle: [],
                    right: ["zoom", "close"]
                  }
                }
              },
              Panzoom: {
                maxScale: 5
              },
              dragToClose: false
            });
          }
        } catch(e) { console.warn('Fancybox init failed', e) }

        // 4. Inicializar Swiper después de insertar scripts and cargar imágenes
        try {
          const imgs = Array.from(document.querySelectorAll('.mySwiper img'));
          await Promise.all(imgs.map(img => img.complete ? Promise.resolve() : new Promise(res => { img.addEventListener('load', res); img.addEventListener('error', res); })));
        } catch(e) { /* ignore image load errors */ }
        initSwiper();
      }

      function initSwiper() {
        if (document.querySelector('.mySwiper')) {
          console.log('initSwiper: checking Swiper availability', typeof Swiper, document.querySelectorAll('.swiper-slide').length);
          if (typeof Swiper === 'undefined') {
            console.error('Swiper is not available on window; slider will not initialize');
            return;
          }
          new Swiper('.mySwiper', {
            autoplay: false,
            // PARÁMETROS CLAVE:
            slidesPerView: 1.2,      // Muestra una imagen y un trozo de la siguiente
            spaceBetween: 10,        // Separación en píxeles entre fotos
            centeredSlides: false,    // Empieza pegado a la izquierda
            
            // Adaptabilidad (Responsive)
            breakpoints: {
                640: { slidesPerView: 2.2 },  // En tablets se ven 2 y pico
                1024: { slidesPerView: 4 }     // En PC se ven 4 como en tu imagen
            },

            loop: true,
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
            });
        }
        
      }

      // Ejecución
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', insertIncludes);
      } else {
        insertIncludes();
      }

const filterButtons = document.querySelectorAll('.illustration-categories .nav-item');
      const galleryItems = document.querySelectorAll('#gallery .gallery-item');

      function collapseAfterFade(item){
        const onEnd = (e) => {
          if (e.propertyName === 'opacity'){
            item.classList.add('collapsed');
            item.removeEventListener('transitionend', onEnd);
          }
        };
        item.addEventListener('transitionend', onEnd);
      }

      function showItem(item){
        // ensure layout space available first
        item.classList.remove('collapsed');
        // force reflow so removal of collapsed takes effect
        void item.offsetWidth;
        item.classList.remove('hidden');
      }

      function hideItem(item){
        if (!item.classList.contains('hidden')){
          item.classList.add('hidden');
          collapseAfterFade(item);
        }
      }

      filterButtons.forEach(button => {
        button.addEventListener('click', () => {
          const filter = button.getAttribute('data-filter');
          filterButtons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');

          galleryItems.forEach(item => {
            if (filter === 'all' || item.getAttribute('data-category') === filter) showItem(item); else hideItem(item);
          });
        });
      });
    

       </script>


</body>
</html>
