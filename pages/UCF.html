<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Quintana</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="/" class="img-link">
            <img src="img/cropped-Logo.png" alt="Logo de Julia Quintana" id="logo" class="header-logo"> 
        </a>
    </header>
    <nav id="navbar">
            <a href="/UCF.html" data-filter="UCF">UCAnFly</a>
            <a href="/ilustration.html" data-filter="ilustration">Ilustration</a>
            <a href="/concept.html" data-filter="concept">Concept</a>
        </nav>
    
    <main>
        <section id ="gallery" class="gallery fade-in">
            <img src = "img/img1.png" alt="Prueba 1" >
            <img src = "img/img2.png" alt="Prueba 2" >
            
        </section>
    </main>

   









    <footer>
        <p>&copy; 2026 Pablo C. &amp; Julia Q.</p>
    </footer>
    <div id="lightbox" class="hidden">
        <span id="close">&times;</span>
        <img id="lightbox-img" src="">
    </div>



    
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close');

        document.querySelectorAll('.gallery img').forEach(img => {
            img.addEventListener('click', () => {
                lightbox.classList.remove('hidden');
                lightboxImg.src = img.src;
            });
        });

        closeBtn.addEventListener('click', () => {
            lightbox.classList.add('hidden');
        });

        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) lightbox.classList.add('hidden');
        });
        </script>
        <script>
            const faders = document.querySelectorAll('.fade-in');

            const appearOptions = {
                threshold: 0.1
            };

            const appearOnScroll = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting){
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, appearOptions);

            faders.forEach(fader => appearOnScroll.observe(fader));
        </script>
</body>
</html>
