        <body>
            <div id="include-header"></div>

                <!-- Project page content retained here -->
            </main>

            <div id="include-footer"></div>

            <script>
            (function(){
              async function loadHtml(url){
                const res = await fetch(url, {cache: 'no-store'});
                if (!res.ok) throw new Error('Failed to load ' + url + ' (' + res.status + ')');
                return await res.text();
              }

              async function insertIncludes(){
                const headerHolder = document.getElementById('include-header');
                if (headerHolder && headerHolder.innerHTML.trim() === ''){
                  try{ headerHolder.innerHTML = await loadHtml('includes/header.html'); }catch(e){console.error(e)}
                }

                const footerHolder = document.getElementById('include-footer');
                if (footerHolder && footerHolder.innerHTML.trim() === ''){
                  try{ footerHolder.innerHTML = await loadHtml('includes/footer.html'); }catch(e){console.error(e)}
                }

                try{
                  const scriptsText = await loadHtml('includes/scripts.html');
                  const doc = new DOMParser().parseFromString(scriptsText, 'text/html');
                  const scripts = Array.from(doc.querySelectorAll('script'));
                  for (const s of scripts){
                    if (s.src){
                      await new Promise((res, rej) => {
                        const sc = document.createElement('script');
                        sc.src = s.src;
                        sc.async = false;
                        sc.onload = res; sc.onerror = rej;
                        document.body.appendChild(sc);
                      });
                    } else {
                      const sc = document.createElement('script');
                      sc.textContent = s.textContent;
                      document.body.appendChild(sc);
                    }
                  }
                } catch(e){ console.error('Error loading shared scripts', e) }
              }

              if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', insertIncludes); else insertIncludes();
            })();
            </script>

        </body>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close');

        document.querySelectorAll('.gallery img').forEach(img => {
            img.addEventListener('click', () => {
                lightbox.classList.remove('hidden');
                lightboxImg.src = img.src;
            });
        });

        closeBtn.addEventListener('click', () => {
            lightbox.classList.add('hidden');
        });

        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) lightbox.classList.add('hidden');
        });
        </script>
        <script>
            const faders = document.querySelectorAll('.fade-in');

            const appearOptions = {
                threshold: 0.1
            };

            const appearOnScroll = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting){
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, appearOptions);

            faders.forEach(fader => appearOnScroll.observe(fader));
        </script>
</body>
