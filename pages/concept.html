<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concept — Julia Quintana</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/includes/lightbox2-2.12.0/dist/css/lightbox.css">
  <base href="/juliaq/">
</head>
<body>
  <div id="include-header"></div>

  <main>
    <section class="content fade-in">
      <div class="container">
        <h1>Concept Art</h1>
        <p>Contenido de la página de concept art. Reemplaza este bloque con el contenido real.</p>
      </div>
    </section>
  </main>

  <div id="include-footer"></div>

  <script>
  (function(){
    async function loadHtml(url){
      const res = await fetch(url, {cache: 'no-store'});
      if (!res.ok) throw new Error('Failed to load ' + url + ' (' + res.status + ')');
      return await res.text();
    }

    async function insertIncludes(){
      const headerHolder = document.getElementById('include-header');
      if (headerHolder && headerHolder.innerHTML.trim() === ''){
        try{ headerHolder.innerHTML = await loadHtml('../includes/header.html'); }catch(e){console.error('header fetch failed', e)}
        if (headerHolder.innerHTML.trim() === ''){
          headerHolder.innerHTML = '<header><a href="/">Home</a></header>';
        }
      }

      const footerHolder = document.getElementById('include-footer');
      if (footerHolder && footerHolder.innerHTML.trim() === ''){
        try{ footerHolder.innerHTML = await loadHtml('../includes/footer.html'); }catch(e){console.error('footer fetch failed', e)}
        if (footerHolder.innerHTML.trim() === ''){
          footerHolder.innerHTML = '<footer><p>&copy; 2026 Julia Quintana</p></footer>';
        }
      }

      try{
        const scriptsText = await loadHtml('../includes/scripts.html');
        const doc = new DOMParser().parseFromString(scriptsText, 'text/html');
        const scripts = Array.from(doc.querySelectorAll('script'));
        for (const s of scripts){
          if (s.src){
            await new Promise((res, rej) => {
              const sc = document.createElement('script');
              sc.src = s.src;
              sc.async = false;
              sc.onload = res; sc.onerror = rej;
              document.body.appendChild(sc);
            });
          } else {
            const sc = document.createElement('script');
            sc.textContent = s.textContent;
            document.body.appendChild(sc);
          }
        }
      } catch(e){ console.error('Error loading shared scripts', e) }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', insertIncludes); else insertIncludes();
  })();
  </script>

</body>
</html>
